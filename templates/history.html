{% extends "base.html" %}

{% block title %}History — FitGlyph{% endblock %}

{% block extra_css %}
<style>
    /* ─── Calendar Container ─────────────────────────────── */
    .cal-container {
        background: var(--bg-raised);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 20px;
        margin-bottom: 24px;
    }

    @media (max-width: 600px) {
        .cal-container { padding: 12px; }
    }

    /* ─── Calendar Nav Row ───────────────────────────────── */
    .cal-nav {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
    }

    .cal-title {
        flex: 1;
        font-family: var(--font-display);
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
        margin: 0;
    }

    .cal-nav-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        background: none;
        border: 1px solid var(--border);
        border-radius: var(--radius-btn);
        color: var(--text-muted);
        cursor: pointer;
        font-size: 16px;
        transition: color 0.15s, border-color 0.15s;
        flex-shrink: 0;
    }

    .cal-nav-btn:hover {
        color: var(--text);
        border-color: oklch(from #cdccca l c h / 0.25);
    }

    .btn-compare {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 36px;
        padding: 0 12px;
        background: none;
        border: 1px solid var(--border);
        border-radius: var(--radius-btn);
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 13px;
        transition: color 0.15s, border-color 0.15s;
        white-space: nowrap;
    }

    .btn-compare:hover {
        color: var(--text);
        border-color: oklch(from #cdccca l c h / 0.25);
    }

    .btn-compare.is-active {
        color: var(--accent);
        border-color: var(--accent);
    }

    @media (max-width: 480px) {
        .btn-compare .compare-btn-text { display: none; }
    }

    /* ─── Compare Banner ─────────────────────────────────── */
    #compare-banner {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 14px;
        margin-bottom: 12px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        font-family: var(--font-body);
        font-size: 13px;
        color: var(--text-muted);
    }

    #compare-banner.active { display: flex; }

    .compare-cancel-btn {
        background: none;
        border: none;
        color: var(--text-faint);
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 13px;
        padding: 4px 8px;
        border-radius: var(--radius-btn);
        transition: color 0.15s;
        min-height: 44px;
    }

    .compare-cancel-btn:hover { color: var(--text); }

    /* ─── Calendar Grid ──────────────────────────────────── */
    .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
    }

    @media (max-width: 480px) {
        .cal-grid { gap: 3px; }
    }

    .cal-dow {
        font-family: var(--font-body);
        font-size: 11px;
        color: var(--text-faint);
        text-align: left;
        padding: 4px 4px 8px;
    }

    @media (max-width: 480px) {
        .cal-dow { font-size: 10px; padding: 2px 2px 6px; }
    }

    /* ─── Calendar Cells ─────────────────────────────────── */
    .cal-cell {
        aspect-ratio: 1;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px;
        cursor: pointer;
        background: var(--bg-base);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        position: relative;
        transition: box-shadow 0.15s;
        min-height: 36px;
    }

    .cal-cell:hover { box-shadow: var(--shadow-hover); }

    .cal-cell__day {
        font-family: var(--font-body);
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
        line-height: 1;
    }

    .cal-cell.other-month {
        cursor: default;
        background: var(--bg-base);
    }

    .cal-cell.other-month:hover { box-shadow: none; }
    .cal-cell.other-month .cal-cell__day { color: var(--text-faint); }

    .cal-cell.today { border: 1px solid var(--accent); }

    .cal-cell.missed-day { border: 1px dashed var(--border); }

    .cal-cell.rest-day { background: var(--bg-elevated); }

    .cal-cell__rest-dot {
        font-family: var(--font-body);
        font-size: 20px;
        color: var(--text-faint);
        line-height: 1;
        align-self: center;
        margin: auto 0;
    }

    .cal-cell__label {
        font-family: var(--font-body);
        font-size: 9px;
        font-weight: 700;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        line-height: 1;
        margin-top: auto;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        opacity: 0.85;
    }

    @media (max-width: 480px) {
        .cal-cell__label { font-size: 8px; }
    }

    /* Compare selection — same hue, two weights */
    .cal-cell.compare-selected-1 {
        outline: 2px solid var(--accent);
        outline-offset: -1px;
    }

    .cal-cell.compare-selected-2 {
        outline: 2px solid oklch(from #4f98a3 l c h / 0.45);
        outline-offset: -1px;
    }

    /* ─── Modal Overrides ────────────────────────────────── */
    .modal-content {
        background: var(--bg-raised);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        color: var(--text);
        box-shadow: var(--shadow-hover);
    }

    .modal-header {
        border-bottom: 1px solid var(--border);
        padding: 16px 20px;
    }

    .modal-title {
        font-family: var(--font-display);
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
    }

    .modal-body { padding: 16px 20px; }

    .modal-footer {
        border-top: 1px solid var(--border);
        padding: 12px 20px;
        gap: 8px;
    }

    .btn-close { filter: invert(1) brightness(0.6); }

    /* ─── Form Controls (Edit Modal) ─────────────────────── */
    .form-control,
    .form-select {
        background: var(--bg-elevated) !important;
        border: 1px solid var(--border) !important;
        color: var(--text) !important;
        border-radius: var(--radius-input) !important;
        font-family: var(--font-body) !important;
        font-size: 14px !important;
    }

    .form-control:focus,
    .form-select:focus {
        background: var(--bg-elevated) !important;
        border-color: var(--accent) !important;
        box-shadow: 0 0 0 2px oklch(from #4f98a3 l c h / 0.20) !important;
        color: var(--text) !important;
    }

    .form-label {
        color: var(--text-muted);
        font-family: var(--font-body);
        font-size: 12px;
        margin-bottom: 4px;
    }

    /* ─── Edit Exercise Card ─────────────────────────────── */
    .edit-exercise-card {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
    }

    .edit-exercise-card__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
    }

    .edit-ex-label {
        font-family: var(--font-body);
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
    }

    /* ─── Set Rows ───────────────────────────────────────── */
    .set-row {
        background: var(--bg-raised);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 8px;
    }

    /* ─── History Activity Cards ─────────────────────────── */
    .hist-card {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 12px 14px;
        margin-bottom: 8px;
    }

    .hist-card--totals {
        border-color: oklch(from #cdccca l c h / 0.18);
    }

    .hist-card__row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
    }

    .hist-card__title {
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
    }

    .hist-card__template {
        font-family: var(--font-body);
        font-size: 12px;
        color: var(--text-faint);
        margin: 0 0 8px;
    }

    .hist-card__actions {
        display: flex;
        gap: 4px;
    }

    .hist-card__notes {
        font-family: var(--font-body);
        font-size: 13px;
        color: var(--text-muted);
        margin: 6px 0 0;
    }

    .hist-card__food-list {
        font-family: var(--font-body);
        font-size: 13px;
        color: var(--text-muted);
        margin: 4px 0 8px;
    }

    .hist-card__time {
        font-family: var(--font-body);
        font-size: 12px;
        color: var(--text-faint);
        display: block;
        margin-top: 6px;
    }

    /* ─── Action Buttons (inside cards) ─────────────────── */
    .hist-action-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: none;
        border: 1px solid var(--border);
        border-radius: var(--radius-btn);
        color: var(--text-faint);
        cursor: pointer;
        font-size: 14px;
        transition: color 0.15s, border-color 0.15s;
    }

    .hist-action-btn:hover {
        color: var(--text);
        border-color: oklch(from #cdccca l c h / 0.25);
    }

    .hist-action-btn--danger:hover {
        color: var(--warning);
        border-color: var(--warning);
    }

    /* ─── Ghost / Primary Buttons (edit modal) ───────────── */
    .btn-hist-ghost {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        height: 32px;
        padding: 0 10px;
        background: none;
        border: 1px solid var(--border);
        border-radius: var(--radius-btn);
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 13px;
        transition: color 0.15s, border-color 0.15s;
    }

    .btn-hist-ghost:hover {
        color: var(--text);
        border-color: oklch(from #cdccca l c h / 0.25);
    }

    .btn-hist-primary {
        display: inline-flex;
        align-items: center;
        height: 36px;
        padding: 0 16px;
        background: var(--accent);
        border: none;
        border-radius: var(--radius-btn);
        color: #fff;
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 500;
        transition: opacity 0.15s;
    }

    .btn-hist-primary:hover { opacity: 0.88; }

    .btn-hist-secondary {
        display: inline-flex;
        align-items: center;
        height: 36px;
        padding: 0 14px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-btn);
        color: var(--text-muted);
        cursor: pointer;
        font-family: var(--font-body);
        font-size: 14px;
        transition: color 0.15s;
    }

    .btn-hist-secondary:hover { color: var(--text); }

    /* ─── Exercise List in Cards ─────────────────────────── */
    .hist-exercise-list {
        padding-left: 8px;
        margin-top: 8px;
    }

    .hist-exercise { margin-bottom: 10px; }

    .hist-exercise__name {
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        margin: 0 0 2px;
    }

    .hist-exercise__superset-label {
        font-weight: 400;
        color: var(--text-faint);
        font-size: 12px;
        margin-right: 4px;
    }

    .hist-exercise__equip {
        font-family: var(--font-body);
        font-size: 11px;
        color: var(--text-faint);
        display: block;
        margin-bottom: 2px;
    }

    .hist-set-list { padding-left: 4px; }

    .hist-set {
        font-family: var(--font-body);
        font-size: 12px;
        color: var(--text-muted);
        display: block;
        margin-bottom: 1px;
        font-variant-numeric: tabular-nums;
    }

    /* ─── Macro Row ──────────────────────────────────────── */
    .hist-macro-row {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
    }

    .hist-macro {
        font-family: var(--font-body);
        font-size: 12px;
        color: var(--text-faint);
    }

    .hist-macro__val {
        font-weight: 600;
        color: var(--text-muted);
        font-variant-numeric: tabular-nums;
    }

    /* ─── Section Labels / Empty States ─────────────────── */
    .hist-section-label {
        font-family: var(--font-body);
        font-size: 11px;
        font-weight: 600;
        color: var(--text-faint);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin: 16px 0 8px;
    }

    .hist-section-label:first-child { margin-top: 0; }

    .hist-empty {
        font-family: var(--font-body);
        font-size: 14px;
        color: var(--text-faint);
        text-align: center;
        padding: 24px 0;
        margin: 0;
    }

    /* ─── Comparison Modal Columns ───────────────────────── */
    .compare-col-header {
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 12px;
    }

    @media (min-width: 768px) {
        .compare-col-right {
            border-left: 1px solid var(--border);
            padding-left: 20px;
        }
    }

    /* ─── Page Heading ───────────────────────────────────── */
    .page-heading {
        font-family: var(--font-display);
        font-size: 24px;
        font-weight: 700;
        color: var(--text);
        margin: 0 0 20px;
    }

    @media (prefers-reduced-motion: reduce) {
        .cal-cell,
        .cal-nav-btn,
        .btn-compare,
        .hist-action-btn,
        .btn-hist-ghost,
        .btn-hist-primary,
        .btn-hist-secondary,
        .compare-cancel-btn { transition: none; }
    }
</style>
{% endblock %}

{% block content %}
<h1 class="page-heading">History</h1>

<!-- Calendar View -->
<div class="cal-container">
    <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)" aria-label="Previous month">
            <i class="bi bi-chevron-left" aria-hidden="true"></i>
        </button>
        <h2 class="cal-title" id="calendar-title"></h2>
        <button id="compare-btn" class="btn-compare" onclick="startCompareMode()">
            <i class="bi bi-layout-split" aria-hidden="true"></i>
            <span class="compare-btn-text">Compare</span>
        </button>
        <button class="cal-nav-btn" onclick="changeMonth(1)" aria-label="Next month">
            <i class="bi bi-chevron-right" aria-hidden="true"></i>
        </button>
    </div>

    <!-- Compare mode status banner -->
    <div id="compare-banner" role="status">
        <span id="compare-banner-text">Select first day</span>
        <button class="compare-cancel-btn" onclick="cancelCompareMode()">Cancel</button>
    </div>

    <!-- Day-of-week headers -->
    <div class="cal-grid">
        <div class="cal-dow">Sun</div>
        <div class="cal-dow">Mon</div>
        <div class="cal-dow">Tue</div>
        <div class="cal-dow">Wed</div>
        <div class="cal-dow">Thu</div>
        <div class="cal-dow">Fri</div>
        <div class="cal-dow">Sat</div>
    </div>

    <!-- Calendar day cells -->
    <div class="cal-grid" id="calendar-grid"></div>
</div>

<!-- Activity Details Modal -->
<div class="modal fade" id="activityModal" tabindex="-1" aria-labelledby="modal-date" aria-modal="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-date"></h3>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button type="button" class="btn-hist-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Workout Modal -->
<div class="modal fade" id="editWorkoutModal" tabindex="-1" aria-labelledby="edit-modal-title" aria-modal="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="edit-modal-title">Edit Workout</h3>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="edit-workout-form">
                    <input type="hidden" id="edit-workout-id">

                    <div class="mb-3">
                        <label for="edit-workout-date" class="form-label">Date &amp; Time</label>
                        <input type="datetime-local" class="form-control" id="edit-workout-date" required>
                    </div>

                    <div class="mb-3">
                        <label for="edit-workout-notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="edit-workout-notes" rows="2"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Exercises</label>
                        <div id="edit-exercises-container"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-hist-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-hist-primary" onclick="saveWorkout()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<!-- Comparison Modal -->
<div class="modal fade" id="comparisonModal" tabindex="-1" aria-labelledby="comparison-modal-title" aria-modal="true">
    <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="comparison-modal-title">Comparison</h3>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <div class="compare-col-header" id="compare-date-1"></div>
                        <div id="compare-body-1"></div>
                    </div>
                    <div class="col-12 col-md-6 compare-col-right">
                        <div class="compare-col-header" id="compare-date-2"></div>
                        <div id="compare-body-2"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-hist-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentDate = new Date();
    let workoutData = {};
    let nutritionData = {};
    let scheduledDaysOfWeek = new Set(); // Python weekday ints: 0=Mon … 6=Sun
    const today = new Date();

    // Compare mode state
    let compareModeActive = false;
    let compareDay1 = null;   // 'YYYY-MM-DD'
    let compareDay2 = null;   // 'YYYY-MM-DD'

    function loadCalendarData() {
        Promise.all([
            fetch('/api/calendar_data').then(r => r.json()),
            fetch('/api/nutrition').then(r => r.json()),
            fetch('/api/templates').then(r => r.json())
        ])
        .then(([workouts, meals, templates]) => {
            workoutData = workouts;

            // Build set of scheduled days-of-week (Python: 0=Mon … 6=Sun)
            scheduledDaysOfWeek = new Set();
            templates.forEach(t => {
                (t.scheduled_days || []).forEach(d => scheduledDaysOfWeek.add(d));
            });

            // Group nutrition data by timezone-adjusted local date
            nutritionData = {};
            meals.forEach(meal => {
                const localDate = applyTimezoneOffset(meal.date);
                const dateStr = localDate.toISOString().split('T')[0];
                if (!nutritionData[dateStr]) nutritionData[dateStr] = [];
                nutritionData[dateStr].push(meal);
            });

            renderCalendar();
        })
        .catch(error => {
            console.error('Error loading calendar data:', error);
            showError('Failed to load calendar data');
        });
    }

    function renderCalendar() {
        const year  = currentDate.getFullYear();
        const month = currentDate.getMonth();

        document.getElementById('calendar-title').textContent =
            currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

        const firstDay       = new Date(year, month, 1).getDay();
        const daysInMonth    = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();

        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';

        // Previous month padding
        for (let i = firstDay - 1; i >= 0; i--) {
            grid.appendChild(createDayCell(daysInPrevMonth - i, true, null));
        }

        // Current month days
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const isToday = (year === today.getFullYear() && month === today.getMonth() && day === today.getDate());
            grid.appendChild(createDayCell(day, false, dateStr, isToday));
        }

        // Next month padding
        const totalCells     = firstDay + daysInMonth;
        const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (let day = 1; day <= remainingCells; day++) {
            grid.appendChild(createDayCell(day, true, null));
        }

        updateLegend(year, month, daysInMonth);
    }

    // Legend removed — kept as no-op to avoid breaking renderCalendar call
    function updateLegend() {}

    function createDayCell(day, isOtherMonth, dateStr = null, isToday = false) {
        const cell = document.createElement('div');
        cell.className = 'cal-cell';

        if (isOtherMonth) cell.classList.add('other-month');
        if (isToday)      cell.classList.add('today');

        const dayNum = document.createElement('span');
        dayNum.className = 'cal-cell__day';
        dayNum.textContent = day;
        cell.appendChild(dayNum);

        if (dateStr) {
            const hasWorkout = workoutData[dateStr] && workoutData[dateStr].length > 0;

            // Mark past scheduled days with no workout as missed
            if (!hasWorkout && !isToday && !isOtherMonth) {
                const cellDate = new Date(dateStr + 'T00:00:00');
                if (cellDate < today) {
                    // JS getDay(): 0=Sun … 6=Sat → Python weekday: Mon=0 … Sun=6
                    const jsDay    = cellDate.getDay();
                    const pythonDay = jsDay === 0 ? 6 : jsDay - 1;
                    if (scheduledDaysOfWeek.has(pythonDay)) {
                        cell.classList.add('missed-day');
                    }
                }
            }

            if (hasWorkout) {
                const workouts    = workoutData[dateStr];
                const allRestDays = workouts.every(w => w.is_rest_day);

                if (allRestDays) {
                    // Rest day: elevated surface + single dot
                    cell.classList.add('rest-day');
                    const dot = document.createElement('span');
                    dot.className = 'cal-cell__rest-dot';
                    dot.textContent = '·';
                    cell.appendChild(dot);
                } else {
                    // Volume heatmap: single accent color, opacity scales with exercise count
                    const totalExercises = workouts
                        .filter(w => !w.is_rest_day)
                        .reduce((sum, w) => sum + (w.exercise_count || 0), 0);

                    let opacity;
                    if      (totalExercises <= 0) opacity = 0.10;
                    else if (totalExercises <= 2) opacity = 0.18;
                    else if (totalExercises <= 5) opacity = 0.42;
                    else                          opacity = 0.75;

                    cell.style.backgroundColor = `rgba(79, 152, 163, ${opacity})`;

                    // Template name label — first word only so it always fits
                    const templateName = workouts.find(w => !w.is_rest_day)?.template_name;
                    if (templateName) {
                        const label = document.createElement('span');
                        label.className = 'cal-cell__label';
                        label.textContent = templateName.split(' ')[0];
                        label.title = templateName; // full name on hover
                        cell.appendChild(label);
                    }
                }
            }

            cell.onclick = () => {
                if (compareModeActive) {
                    handleCompareDayClick(dateStr, cell);
                } else {
                    showActivityDetails(dateStr);
                }
            };
        }

        return cell;
    }

    function formatEquipmentType(type) {
        const labels = { barbell: 'Barbell', free_weight: 'Free Weight', cable: 'Cable', machine: 'Machine' };
        return labels[type] || type;
    }

    /**
     * Builds HTML for a list of workout objects.
     * Used by both the activity modal and the comparison modal.
     */
    function buildWorkoutHtml(workouts, includeActions = false) {
        if (!workouts || workouts.length === 0) {
            return '<p class="hist-empty">No workouts logged.</p>';
        }

        let html = '';

        workouts.forEach((w, idx) => {
            // Rest day entry
            if (w.is_rest_day) {
                html += `<div class="hist-card">
                    <div class="hist-card__row">
                        <span class="hist-card__title">Rest Day</span>
                        <div class="hist-card__actions">`;
                if (includeActions) {
                    html += `<button class="hist-action-btn hist-action-btn--danger" onclick="deleteWorkoutConfirm(${w.id})" title="Delete" aria-label="Delete rest day">
                        <i class="bi bi-trash" aria-hidden="true"></i>
                    </button>`;
                }
                html += `</div></div>`;
                if (w.notes) html += `<p class="hist-card__notes">${w.notes}</p>`;
                html += `</div>`;
                return;
            }

            const workoutLabel = workouts.length > 1 ? `Workout ${idx + 1}` : 'Workout';
            html += `<div class="hist-card">
                <div class="hist-card__row">
                    <span class="hist-card__title">${workoutLabel}</span>
                    <div class="hist-card__actions">`;

            if (includeActions) {
                html += `
                    <button class="hist-action-btn" onclick="editWorkout(${w.id})" title="Edit" aria-label="Edit workout">
                        <i class="bi bi-pencil" aria-hidden="true"></i>
                    </button>
                    <button class="hist-action-btn hist-action-btn--danger" onclick="deleteWorkoutConfirm(${w.id})" title="Delete" aria-label="Delete workout">
                        <i class="bi bi-trash" aria-hidden="true"></i>
                    </button>`;
            }

            html += `</div></div>`;

            if (w.template_name) {
                html += `<p class="hist-card__template">${w.template_name}</p>`;
            }

            if (w.exercises && w.exercises.length > 0) {
                html += '<div class="hist-exercise-list">';
                w.exercises.forEach(ex => {
                    html += `<div class="hist-exercise">`;

                    if (ex.is_superset) {
                        html += `<p class="hist-exercise__name"><span class="hist-exercise__superset-label">A / B</span>${ex.name} / ${ex.superset_exercise_name || 'Exercise B'}</p>`;
                    } else {
                        html += `<p class="hist-exercise__name">${ex.name}</p>`;
                    }

                    if (ex.equipment_type) {
                        html += `<span class="hist-exercise__equip">${formatEquipmentType(ex.equipment_type)}</span>`;
                    }

                    if (ex.set_data && ex.set_data.length > 0) {
                        html += '<div class="hist-set-list">';
                        ex.set_data.forEach((set, setIdx) => {
                            let displayText = '';
                            let dropPrefix  = '';

                            if (ex.is_superset) {
                                const repsA    = set.reps_a || set.reps || '-';
                                const repsB    = set.reps_b || set.reps || '-';
                                const weightA  = set.weight_a !== null && set.weight_a !== undefined ? set.weight_a : '-';
                                const weightB  = set.weight_b !== null && set.weight_b !== undefined ? set.weight_b : '-';
                                displayText = `${repsA} reps @ ${weightA} lbs / ${repsB} reps @ ${weightB} lbs`;
                            } else if (set.is_drop_set && set.stages && set.stages.length > 0) {
                                const stageTexts = set.stages.map(stage => {
                                    const weight = stage.weight !== null && stage.weight !== undefined ? `${stage.weight}` : 'BW';
                                    return `${stage.reps} @ ${weight}`;
                                });
                                displayText = stageTexts.join(' → ') + ' lbs';
                                dropPrefix  = 'Drop — ';
                            } else {
                                const weightDisplay = set.weight !== null && set.weight !== undefined ? ` @ ${set.weight} lbs` : '';
                                displayText = `${set.reps} reps${weightDisplay}`;
                            }
                            html += `<span class="hist-set">${dropPrefix}Set ${set.set_number || setIdx + 1}: ${displayText}</span>`;
                        });
                        html += '</div>';
                    } else {
                        const weightDisplay = ex.weight !== null && ex.weight !== undefined ? ` @ ${ex.weight} lbs` : '';
                        html += `<span class="hist-set">${ex.sets} × ${ex.reps} reps${weightDisplay}</span>`;
                    }

                    if (ex.rest_time) {
                        html += `<span class="hist-set">Rest: ${ex.rest_time}s</span>`;
                    }
                    html += `</div>`;
                });
                html += '</div>';
            }

            if (w.notes) {
                html += `<p class="hist-card__notes">${w.notes}</p>`;
            }

            if (w.date) {
                const adjustedDate = applyTimezoneOffset(w.date);
                const workoutTime  = adjustedDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                html += `<span class="hist-card__time">${workoutTime}</span>`;
            }

            html += '</div>';
        });

        return html;
    }

    function showActivityDetails(dateStr) {
        const workouts = workoutData[dateStr] || [];
        const meals    = nutritionData[dateStr] || [];
        const modal    = new bootstrap.Modal(document.getElementById('activityModal'));

        const date = new Date(dateStr + 'T00:00:00');
        document.getElementById('modal-date').textContent =
            date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        const modalBody = document.getElementById('modal-body');
        let html = '';

        if (workouts.length > 0) {
            html += buildWorkoutHtml(workouts, true);
        }

        if (meals.length > 0) {
            html += '<p class="hist-section-label">Nutrition</p>';

            let totalCals = 0, totalProtein = 0, totalCarbs = 0, totalFats = 0;

            meals.forEach(meal => {
                totalCals    += meal.totals.calories;
                totalProtein += meal.totals.protein;
                totalCarbs   += meal.totals.carbs;
                totalFats    += meal.totals.fats;

                const mealTime = applyTimezoneOffset(meal.date)
                    .toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

                html += `<div class="hist-card">
                    <div class="hist-card__row">
                        <span class="hist-card__title">${meal.meal_type}</span>
                        <span class="hist-card__time" style="margin-top:0">${mealTime}</span>
                    </div>
                    <p class="hist-card__food-list">${meal.food_items.map(item => `${item.name} (${item.quantity}${item.unit})`).join(', ')}</p>
                    <div class="hist-macro-row">
                        <span class="hist-macro"><span class="hist-macro__val">${Math.round(meal.totals.calories)}</span> cal</span>
                        <span class="hist-macro"><span class="hist-macro__val">${Math.round(meal.totals.protein)}g</span> P</span>
                        <span class="hist-macro"><span class="hist-macro__val">${Math.round(meal.totals.carbs)}g</span> C</span>
                        <span class="hist-macro"><span class="hist-macro__val">${Math.round(meal.totals.fats)}g</span> F</span>
                    </div>
                </div>`;
            });

            html += `<div class="hist-card hist-card--totals">
                <p class="hist-card__title" style="margin-bottom:8px">Daily totals</p>
                <div class="hist-macro-row">
                    <span class="hist-macro"><span class="hist-macro__val">${Math.round(totalCals)}</span> cal</span>
                    <span class="hist-macro"><span class="hist-macro__val">${Math.round(totalProtein)}g</span> P</span>
                    <span class="hist-macro"><span class="hist-macro__val">${Math.round(totalCarbs)}g</span> C</span>
                    <span class="hist-macro"><span class="hist-macro__val">${Math.round(totalFats)}g</span> F</span>
                </div>
            </div>`;
        }

        if (workouts.length === 0 && meals.length === 0) {
            html = '<p class="hist-empty">No workouts or meals logged for this day.</p>';
        }

        modalBody.innerHTML = html;
        modal.show();
    }

    function showComparisonView(date1, date2) {
        const formatOpts = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
        document.getElementById('compare-date-1').textContent =
            new Date(date1 + 'T00:00:00').toLocaleDateString('en-US', formatOpts);
        document.getElementById('compare-date-2').textContent =
            new Date(date2 + 'T00:00:00').toLocaleDateString('en-US', formatOpts);
        document.getElementById('compare-body-1').innerHTML = buildWorkoutHtml(workoutData[date1] || [], false);
        document.getElementById('compare-body-2').innerHTML = buildWorkoutHtml(workoutData[date2] || [], false);
        new bootstrap.Modal(document.getElementById('comparisonModal')).show();
    }

    function startCompareMode() {
        compareModeActive = true;
        compareDay1 = null;
        compareDay2 = null;
        document.getElementById('compare-banner').classList.add('active');
        document.getElementById('compare-banner-text').textContent = 'Select first day';
        document.getElementById('compare-btn').classList.add('is-active');
    }

    function cancelCompareMode() {
        compareModeActive = false;
        compareDay1 = null;
        compareDay2 = null;
        document.getElementById('compare-banner').classList.remove('active');
        document.getElementById('compare-btn').classList.remove('is-active');
        document.querySelectorAll('.cal-cell.compare-selected-1, .cal-cell.compare-selected-2')
            .forEach(el => el.classList.remove('compare-selected-1', 'compare-selected-2'));
    }

    function handleCompareDayClick(dateStr, cell) {
        if (compareDay1 === null) {
            compareDay1 = dateStr;
            cell.classList.add('compare-selected-1');
            document.getElementById('compare-banner-text').textContent = 'Now select second day';
        } else if (dateStr === compareDay1) {
            // Deselect Day 1
            compareDay1 = null;
            cell.classList.remove('compare-selected-1');
            document.getElementById('compare-banner-text').textContent = 'Select first day';
        } else if (compareDay2 === null) {
            compareDay2 = dateStr;
            cell.classList.add('compare-selected-2');
            document.getElementById('compare-banner-text').textContent = 'Loading comparison...';
            const d1 = compareDay1;
            const d2 = compareDay2;
            setTimeout(() => {
                cancelCompareMode();
                showComparisonView(d1, d2);
            }, 150);
        }
    }

    function changeMonth(delta) {
        currentDate.setMonth(currentDate.getMonth() + delta);
        renderCalendar();
    }

    // Edit workout functionality
    async function editWorkout(workoutId) {
        try {
            const response = await fetch(`/api/workouts/${workoutId}`);
            const workout  = await response.json();

            // Close activity modal
            bootstrap.Modal.getInstance(document.getElementById('activityModal')).hide();

            document.getElementById('edit-workout-id').value    = workout.id;
            document.getElementById('edit-workout-date').value  = dateToLocalInputValue(workout.date);
            document.getElementById('edit-workout-notes').value = workout.notes || '';

            const container = document.getElementById('edit-exercises-container');
            container.innerHTML = '';

            workout.exercises.forEach((ex, idx) => {
                const exerciseCard = document.createElement('div');
                exerciseCard.className = 'edit-exercise-card';
                exerciseCard.innerHTML = `
                    <div class="edit-exercise-card__header">
                        <span class="edit-ex-label">Exercise ${idx + 1}</span>
                        <button type="button" class="hist-action-btn hist-action-btn--danger" onclick="removeExercise(this)" aria-label="Remove exercise">
                            <i class="bi bi-trash" aria-hidden="true"></i>
                        </button>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Exercise Name</label>
                        <input type="text" class="form-control exercise-name" value="${ex.name}" required>
                    </div>
                    <div class="exercise-sets-container" data-exercise-idx="${idx}">
                        ${renderExerciseSets(ex)}
                    </div>
                    <button type="button" class="btn-hist-ghost" style="margin-top:8px" onclick="addSet(this)">
                        <i class="bi bi-plus" aria-hidden="true"></i> Add Set
                    </button>
                `;
                container.appendChild(exerciseCard);
            });

            new bootstrap.Modal(document.getElementById('editWorkoutModal')).show();
        } catch (error) {
            console.error('Error loading workout:', error);
            showError('Failed to load workout details');
        }
    }

    function renderExerciseSets(exercise) {
        let html = '';

        if (exercise.set_data && exercise.set_data.length > 0) {
            exercise.set_data.forEach((set, setIdx) => {
                html += `
                    <div class="row mb-2 set-row">
                        <div class="col-md-4">
                            <label class="form-label">Set ${setIdx + 1} Reps</label>
                            <input type="number" class="form-control form-control-sm set-reps" value="${set.reps}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Weight (optional)</label>
                            <input type="number" step="0.5" class="form-control form-control-sm set-weight" value="${set.weight || ''}" placeholder="Optional">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Rest (s)</label>
                            <input type="number" class="form-control form-control-sm set-rest" value="${exercise.rest_time || 0}">
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="button" class="hist-action-btn hist-action-btn--danger" onclick="removeSet(this)" aria-label="Remove set">
                                <i class="bi bi-x" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        } else {
            for (let i = 0; i < exercise.sets; i++) {
                html += `
                    <div class="row mb-2 set-row">
                        <div class="col-md-4">
                            <label class="form-label">Set ${i + 1} Reps</label>
                            <input type="number" class="form-control form-control-sm set-reps" value="${exercise.reps}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Weight (optional)</label>
                            <input type="number" step="0.5" class="form-control form-control-sm set-weight" value="${exercise.weight || ''}" placeholder="Optional">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Rest (s)</label>
                            <input type="number" class="form-control form-control-sm set-rest" value="${exercise.rest_time || 0}">
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="button" class="hist-action-btn hist-action-btn--danger" onclick="removeSet(this)" aria-label="Remove set">
                                <i class="bi bi-x" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        return html;
    }

    function addSet(button) {
        const exerciseCard  = button.closest('.edit-exercise-card');
        const setsContainer = exerciseCard.querySelector('.exercise-sets-container');
        const setCount      = setsContainer.querySelectorAll('.set-row').length + 1;

        const setRow = document.createElement('div');
        setRow.className = 'row mb-2 set-row';
        setRow.innerHTML = `
            <div class="col-md-4">
                <label class="form-label">Set ${setCount} Reps</label>
                <input type="number" class="form-control form-control-sm set-reps" value="10" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Weight (optional)</label>
                <input type="number" step="0.5" class="form-control form-control-sm set-weight" value="" placeholder="Optional">
            </div>
            <div class="col-md-3">
                <label class="form-label">Rest (s)</label>
                <input type="number" class="form-control form-control-sm set-rest" value="90">
            </div>
            <div class="col-md-1 d-flex align-items-end">
                <button type="button" class="hist-action-btn hist-action-btn--danger" onclick="removeSet(this)" aria-label="Remove set">
                    <i class="bi bi-x" aria-hidden="true"></i>
                </button>
            </div>
        `;
        setsContainer.appendChild(setRow);
    }

    function removeSet(button) {
        const setRow        = button.closest('.set-row');
        const setsContainer = setRow.closest('.exercise-sets-container');

        if (setsContainer.querySelectorAll('.set-row').length > 1) {
            setRow.remove();
            // Renumber remaining sets
            setsContainer.querySelectorAll('.set-row').forEach((row, idx) => {
                row.querySelector('.form-label').textContent = `Set ${idx + 1} Reps`;
            });
        } else {
            showWarning('Each exercise must have at least one set');
        }
    }

    function removeExercise(button) {
        const container = document.getElementById('edit-exercises-container');
        if (container.children.length > 1) {
            button.closest('.edit-exercise-card').remove();
            // Renumber remaining exercises
            Array.from(container.children).forEach((card, idx) => {
                card.querySelector('.edit-ex-label').textContent = `Exercise ${idx + 1}`;
            });
        } else {
            showWarning('Workout must have at least one exercise');
        }
    }

    async function saveWorkout() {
        const workoutId = document.getElementById('edit-workout-id').value;
        const localDate = document.getElementById('edit-workout-date').value;
        const date      = localInputValueToUTC(localDate);
        const notes     = document.getElementById('edit-workout-notes').value;

        const exercises    = [];
        const exerciseCards = document.querySelectorAll('#edit-exercises-container .edit-exercise-card');

        exerciseCards.forEach(card => {
            const name    = card.querySelector('.exercise-name').value;
            const setRows = card.querySelectorAll('.set-row');
            const setData = [];

            setRows.forEach((row, idx) => {
                const reps        = parseInt(row.querySelector('.set-reps').value);
                const weightInput = row.querySelector('.set-weight').value;
                const weight      = weightInput && weightInput.trim() !== '' ? parseFloat(weightInput) : null;
                setData.push({ set_number: idx + 1, reps, weight });
            });

            const totalSets      = setData.length;
            const avgReps        = Math.round(setData.reduce((sum, s) => sum + s.reps, 0) / totalSets);
            const setsWithWeight = setData.filter(s => s.weight !== null);
            const avgWeight      = setsWithWeight.length > 0
                ? setsWithWeight.reduce((sum, s) => sum + s.weight, 0) / setsWithWeight.length
                : null;
            const restTime = parseInt(card.querySelector('.set-rest').value) || 0;

            exercises.push({ name, sets: totalSets, reps: avgReps, weight: avgWeight, rest_time: restTime, set_data: setData });
        });

        try {
            const response = await fetch(`/api/workouts/${workoutId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date, notes, exercises })
            });

            const result = await response.json();

            if (result.success) {
                bootstrap.Modal.getInstance(document.getElementById('editWorkoutModal')).hide();
                loadCalendarData();
                showSuccess('Workout updated');
            } else {
                showError('Failed to update workout');
            }
        } catch (error) {
            console.error('Error updating workout:', error);
            showError('Failed to update workout');
        }
    }

    async function deleteWorkoutConfirm(workoutId) {
        if (!confirm('Delete this workout? This cannot be undone.')) return;

        try {
            const response = await fetch(`/api/workouts/${workoutId}`, { method: 'DELETE' });
            const result   = await response.json();

            if (result.success) {
                const activityModal = bootstrap.Modal.getInstance(document.getElementById('activityModal'));
                if (activityModal) activityModal.hide();
                loadCalendarData();
                showSuccess('Workout deleted');
            } else {
                showError('Failed to delete workout');
            }
        } catch (error) {
            console.error('Error deleting workout:', error);
            showError('Failed to delete workout');
        }
    }

    // Initial load
    loadCalendarData();

    // Check if a specific date was passed in the URL (from home calendar click)
    function checkForDateParameter() {
        const urlParams = new URLSearchParams(window.location.search);
        const dateParam = urlParams.get('date');

        if (dateParam) {
            setTimeout(() => {
                if (workoutData[dateParam] || nutritionData[dateParam]) {
                    showActivityDetails(dateParam);
                    window.history.replaceState({}, '', '/history');
                }
            }, 500);
        }
    }

    checkForDateParameter();
</script>
