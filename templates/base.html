<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FitGlyph{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://api.fontshare.com">
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700&f[]=satoshi@400,500,700&display=swap">

    <!-- Bootstrap (retained until all screens rebuilt) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='onboarding-tour.css') }}">

    <style>
        /* ─── Design Tokens ──────────────────────────────────── */
        :root {
            --bg-base:      #0f0e0d;
            --bg-raised:    #161513;
            --bg-elevated:  #1c1b19;
            --border:       oklch(from #cdccca l c h / 0.10);
            --text:         #cdccca;
            --text-muted:   #797876;
            --text-faint:   #5a5957;
            --accent:       #4f98a3;
            --success:      #6daa45;
            --warning:      #bb653b;
            --font-display: 'Cabinet Grotesk', system-ui, sans-serif;
            --font-body:    'Satoshi', system-ui, sans-serif;
            --shadow-card:  0 1px 2px oklch(0 0 0 / 0.20), 0 4px 16px oklch(0 0 0 / 0.14);
            --shadow-hover: 0 2px 4px oklch(0 0 0 / 0.28), 0 12px 32px oklch(0 0 0 / 0.18);
            --radius-card:  10px;
            --radius-input: 6px;
            --radius-btn:   6px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--bg-base);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
            padding-bottom: 70px;
        }

        body.no-bottom-nav { padding-bottom: 0; }

        /* ─── Top Header ─────────────────────────────────────── */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 100;
            height: 52px;
            background: var(--bg-base);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        .site-header__brand {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .site-header__logo {
            height: 30px;
            width: auto;
            display: block;
        }

        .site-header__version {
            font-family: var(--font-body);
            font-size: 11px;
            color: var(--text-faint);
            letter-spacing: 0.03em;
            flex-shrink: 0;
        }

        .site-header__actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .site-header__username {
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--text-muted);
            padding: 0 8px;
        }

        .site-header__link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 18px;
            border-radius: var(--radius-btn);
            transition: color 0.15s;
        }

        .site-header__link:hover { color: var(--text); }

        /* ─── Bottom Nav ─────────────────────────────────────── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--bg-base);
            border-top: 1px solid var(--border);
            display: flex;
            z-index: 100;
        }

        .bottom-nav__item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            color: var(--text-faint);
            text-decoration: none;
            font-family: var(--font-body);
            font-size: 11px;
            min-height: 44px;
            transition: color 0.15s;
        }

        .bottom-nav__item:hover { color: var(--text-muted); }

        .bottom-nav__item.active { color: var(--accent); }

        .bottom-nav__item i {
            font-size: 22px;
            line-height: 1;
        }

        /* ─── Toast Notifications ────────────────────────────── */
        .toast-container {
            position: fixed;
            top: 64px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .fg-toast {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 14px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            min-width: 280px;
            max-width: 360px;
            pointer-events: all;
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text);
            opacity: 0;
            transform: translateX(12px);
            transition: opacity 0.2s, transform 0.2s;
        }

        .fg-toast.is-visible {
            opacity: 1;
            transform: translateX(0);
        }

        .fg-toast.is-hiding {
            opacity: 0;
            transform: translateX(12px);
        }

        .fg-toast__icon {
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .fg-toast--success .fg-toast__icon { color: var(--success); }
        .fg-toast--warning .fg-toast__icon { color: var(--warning); }
        .fg-toast--info    .fg-toast__icon { color: var(--accent);  }

        .fg-toast__body {
            flex: 1;
            line-height: 1.4;
        }

        .fg-toast__close {
            background: none;
            border: none;
            color: var(--text-faint);
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            line-height: 1;
            flex-shrink: 0;
            align-self: flex-start;
            transition: color 0.15s;
        }

        .fg-toast__close:hover { color: var(--text); }

        /* ─── Reduced Motion ─────────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {
            .fg-toast,
            .bottom-nav__item,
            .site-header__link { transition: none; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body {% if not current_user.is_authenticated %}class="no-bottom-nav"{% endif %}>

    <header class="site-header">
        <div class="site-header__brand">
            <img src="{{ url_for('static', filename='transparent-logo-fitglyph.svg') }}"
                 alt="FitGlyph"
                 width="90" height="30"
                 loading="lazy"
                 class="site-header__logo">
            <span class="site-header__version">v{{ app_version }}</span>
        </div>
        <div class="site-header__actions">
            {% if current_user.is_authenticated %}
            <span class="site-header__username">{{ current_user.username }}</span>
            <a href="/logout" class="site-header__link" title="Log out" aria-label="Log out">
                <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
            </a>
            {% endif %}
            <a href="/settings" class="site-header__link" title="Settings" aria-label="Settings">
                <i class="bi bi-gear" aria-hidden="true"></i>
            </a>
        </div>
    </header>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="false"></div>

    <div class="container mt-3">
        {% block content %}{% endblock %}
    </div>

    {% if current_user.is_authenticated %}
    <nav class="bottom-nav" aria-label="Primary navigation">
        <a href="/" class="bottom-nav__item {% if request.path == '/' %}active{% endif %}"
           {% if request.path == '/' %}aria-current="page"{% endif %}>
            <i class="bi bi-house-door" aria-hidden="true"></i>
            <span>Home</span>
        </a>
        <a href="/log" class="bottom-nav__item {% if request.path == '/log' %}active{% endif %}"
           {% if request.path == '/log' %}aria-current="page"{% endif %}>
            <i class="bi bi-plus-circle" aria-hidden="true"></i>
            <span>Log</span>
        </a>
        <a href="/nutrition" class="bottom-nav__item {% if request.path == '/nutrition' %}active{% endif %}"
           {% if request.path == '/nutrition' %}aria-current="page"{% endif %}>
            <i class="bi bi-egg-fried" aria-hidden="true"></i>
            <span>Nutrition</span>
        </a>
        <a href="/history" class="bottom-nav__item {% if request.path == '/history' %}active{% endif %}"
           {% if request.path == '/history' %}aria-current="page"{% endif %}>
            <i class="bi bi-clock-history" aria-hidden="true"></i>
            <span>History</span>
        </a>
        <a href="/progress" class="bottom-nav__item {% if request.path == '/progress' %}active{% endif %}"
           {% if request.path == '/progress' %}aria-current="page"{% endif %}>
            <i class="bi bi-graph-up" aria-hidden="true"></i>
            <span>Progress</span>
        </a>
    </nav>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='onboarding-tour.js') }}"></script>

    <script>
        // ─── Timezone (in-memory; no localStorage) ────────────
        let _timezoneOffset = 0;

        function getTimezoneOffset() {
            return _timezoneOffset;
        }

        {% if current_user.is_authenticated %}
        fetch('/api/user/timezone')
            .then(r => r.json())
            .then(data => { _timezoneOffset = data.timezone_offset || 0; })
            .catch(() => { _timezoneOffset = 0; });
        {% endif %}

        function applyTimezoneOffset(utcDateString) {
            const date = new Date(utcDateString);
            date.setUTCHours(date.getUTCHours() + _timezoneOffset);
            return date;
        }

        function formatDateWithTimezone(utcDateString, includeTime = true) {
            const date = applyTimezoneOffset(utcDateString);
            if (includeTime) {
                return date.toLocaleString('en-US', {
                    year: 'numeric', month: 'short', day: 'numeric',
                    hour: 'numeric', minute: '2-digit', hour12: true,
                    timeZone: 'UTC'
                });
            }
            return date.toLocaleDateString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric',
                timeZone: 'UTC'
            });
        }

        function dateToLocalInputValue(utcDateString) {
            const date  = applyTimezoneOffset(utcDateString);
            const year  = date.getUTCFullYear();
            const month = String(date.getUTCMonth() + 1).padStart(2, '0');
            const day   = String(date.getUTCDate()).padStart(2, '0');
            const hours = String(date.getUTCHours()).padStart(2, '0');
            const mins  = String(date.getUTCMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${mins}`;
        }

        function localInputValueToUTC(localDateTimeValue) {
            const [datePart, timePart] = localDateTimeValue.split('T');
            const [y, mo, d] = datePart.split('-');
            const [h, mi]    = timePart.split(':');
            const date = new Date(Date.UTC(+y, +mo - 1, +d, +h, +mi));
            date.setUTCHours(date.getUTCHours() - _timezoneOffset);
            return date.toISOString();
        }

        // ─── Toast Notification System ────────────────────────
        const _toastIconMap = {
            success: 'bi-check-circle-fill',
            warning: 'bi-exclamation-triangle-fill',
            error:   'bi-exclamation-triangle-fill',
            info:    'bi-info-circle-fill'
        };

        const _toastTypeMap = {
            success: 'success',
            warning: 'warning',
            error:   'warning',   // error renders as warning
            info:    'info'
        };

        function showToast(message, type = 'info', duration = 3000) {
            const container   = document.getElementById('toast-container');
            const cssType     = _toastTypeMap[type]  || 'info';
            const icon        = _toastIconMap[type]   || _toastIconMap.info;

            const el = document.createElement('div');
            el.className = `fg-toast fg-toast--${cssType}`;
            el.setAttribute('role', 'alert');
            el.innerHTML = `
                <i class="bi ${icon} fg-toast__icon" aria-hidden="true"></i>
                <span class="fg-toast__body">${message}</span>
                <button class="fg-toast__close" aria-label="Dismiss">
                    <i class="bi bi-x" aria-hidden="true"></i>
                </button>
            `;

            el.querySelector('.fg-toast__close').addEventListener('click', () => {
                clearTimeout(timer);
                _dismissToast(el);
            });

            container.appendChild(el);

            // Animate in (double rAF to ensure paint before class add)
            requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('is-visible')));

            const timer = setTimeout(() => _dismissToast(el), duration);
        }

        function _dismissToast(el) {
            el.classList.add('is-hiding');
            el.addEventListener('transitionend', () => el.remove(), { once: true });
        }

        // Convenience aliases — same call signatures as before
        function showSuccess(message, duration) { showToast(message, 'success', duration); }
        function showError(message, duration)   { showToast(message, 'error',   duration); }
        function showWarning(message, duration) { showToast(message, 'warning', duration); }
        function showInfo(message, duration)    { showToast(message, 'info',    duration); }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
