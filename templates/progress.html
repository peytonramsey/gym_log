{% extends "base.html" %}

{% block title %}Progress — FitGlyph{% endblock %}

{% block extra_css %}
<style>
    /* ── Controls ────────────────────────────────────────────── */
    .progress-controls {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 20px;
    }

    .progress-controls .template-wrap { flex: 1; min-width: 0; }
    .progress-controls .period-wrap   { flex: 0 0 148px; }

    .form-select {
        background-color: var(--bg-elevated) !important;
        border: 1px solid var(--border) !important;
        border-radius: var(--radius-input) !important;
        color: var(--text) !important;
        font-family: var(--font-body);
        font-size: 14px;
    }

    .form-select:focus {
        background-color: var(--bg-elevated) !important;
        border-color: var(--accent) !important;
        color: var(--text) !important;
        box-shadow: 0 0 0 2px oklch(from #4f98a3 l c h / 0.20) !important;
        outline: none;
    }

    .form-select option {
        background: var(--bg-elevated);
        color: var(--text);
    }

    /* ── Exercise card ───────────────────────────────────────── */
    .prog-card {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        margin-bottom: 12px;
        overflow: hidden;
    }

    .prog-card__header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px 10px;
    }

    .prog-card__meta {
        display: flex;
        align-items: baseline;
        gap: 8px;
        min-width: 0;
    }

    .prog-card__name {
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .prog-card__equip {
        font-family: var(--font-body);
        font-size: 11px;
        color: var(--text-faint);
        white-space: nowrap;
        flex-shrink: 0;
    }

    /* ── Delta ───────────────────────────────────────────────── */
    .prog-card__delta {
        font-family: var(--font-body);
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
    }

    .delta--positive { color: var(--success); }
    .delta--negative { color: var(--text-muted); }
    .delta--neutral  { color: var(--text-faint); }

    /* ── Chart container ─────────────────────────────────────── */
    .prog-card__chart {
        position: relative;
        height: 130px;
        padding: 0 14px 12px;
    }

    .prog-card__chart canvas {
        width: 100% !important;
        height: 130px !important;
    }

    /* ── Session-only body (bodyweight, no weight data) ──────── */
    .prog-card__sessions {
        padding: 6px 14px 12px;
        font-family: var(--font-body);
        font-size: 13px;
        color: var(--text-muted);
    }

    /* ── Empty states ────────────────────────────────────────── */
    .prog-empty {
        padding: 32px 0 24px;
        font-family: var(--font-body);
        font-size: 14px;
        color: var(--text-muted);
    }

    .prog-empty__title {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        margin: 0 0 4px;
    }

    .prog-empty__sub {
        font-size: 13px;
        color: var(--text-muted);
        margin: 0;
    }

    .prog-empty__sub a {
        color: var(--accent);
        text-decoration: none;
    }

    /* ── Loading spinner (token override) ────────────────────── */
    .prog-spinner {
        padding: 32px 0;
        text-align: center;
        color: var(--text-muted);
        font-size: 13px;
    }

    .spinner-border {
        color: var(--accent) !important;
        width: 1.5rem;
        height: 1.5rem;
        border-width: 2px;
    }

    /* ── No-data inline ──────────────────────────────────────── */
    .prog-card__nodata {
        padding: 8px 14px 12px;
        font-family: var(--font-body);
        font-size: 12px;
        color: var(--text-faint);
    }

    /* ── 1RM Bayesian card ───────────────────────────────────── */
    .one-rm-card {
        border-top: 1px solid var(--border);
        padding: 12px 14px 14px;
    }

    .one-rm-card--loading {
        border-top: 1px solid var(--border);
        padding: 10px 14px 12px;
        font-family: var(--font-body);
        font-size: 12px;
        color: var(--text-faint);
        opacity: 0.4;
    }

    .one-rm-card--error {
        border-top: 1px solid var(--border);
        padding: 10px 14px 12px;
        font-family: var(--font-body);
        font-size: 12px;
        color: var(--text-faint);
        opacity: 0.4;
    }

    .one-rm__mean-row {
        display: flex;
        align-items: baseline;
        gap: 5px;
        margin-bottom: 10px;
    }

    .one-rm__mean {
        font-family: var(--font-display);
        font-size: 40px;
        font-weight: 700;
        line-height: 1;
        color: var(--text);
        font-variant-numeric: tabular-nums;
    }

    .one-rm__unit {
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 1;
        color: var(--text-muted);
    }

    /* Flat HDI range bar — no gradient */
    .one-rm__range-wrap {
        position: relative;
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        margin-bottom: 6px;
        overflow: visible;
    }

    .one-rm__range-fill {
        position: absolute;
        top: 0;
        height: 100%;
        border-radius: 3px;
        background: rgba(79, 152, 163, 0.40);
    }

    .one-rm__range-tick {
        position: absolute;
        top: -3px;
        width: 2px;
        height: 12px;
        background: #4f98a3;
        border-radius: 1px;
        transform: translateX(-50%);
    }

    .one-rm__bounds {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-body);
        font-size: 11px;
        color: var(--text-muted);
        font-variant-numeric: tabular-nums;
        margin-bottom: 4px;
    }

    .one-rm__label-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .one-rm__ci-label {
        font-family: var(--font-body);
        font-size: 10px;
        color: var(--text-faint);
        letter-spacing: 0.02em;
    }

    .one-rm__uncertainty {
        font-family: var(--font-body);
        font-size: 10px;
        color: var(--warning);
    }

    /* ── Reduced motion ──────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
        .form-select { transition: none; }
    }
</style>
{% endblock %}

{% block content %}
<h1 class="page-heading" style="font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--text);margin:0 0 20px;">Progress</h1>

<!-- ── Controls ──────────────────────────────────────────────── -->
<div class="progress-controls" id="progress-controls">
    <div class="template-wrap">
        <select class="form-select" id="template-select" aria-label="Select template" onchange="onTemplateChange()">
            <option value="">Loading templates…</option>
        </select>
    </div>
    <div class="period-wrap">
        <select class="form-select" id="period-select" aria-label="Select time period" onchange="onPeriodChange()">
            <option value="1w">Last week</option>
            <option value="1m" selected>Last month</option>
            <option value="3m">Last 3 months</option>
            <option value="6m">Last 6 months</option>
            <option value="all">All time</option>
        </select>
    </div>
</div>

<!-- ── No workout history empty state ──────────────────────────── -->
<div class="prog-empty d-none" id="no-templates-msg">
    <p class="prog-empty__title">No completed workouts yet</p>
    <p class="prog-empty__sub">Log a workout on the <a href="/log">Log</a> page and your progress will appear here.</p>
</div>

<!-- ── Loading ────────────────────────────────────────────────── -->
<div id="exercises-loading" class="prog-spinner d-none" aria-live="polite">
    <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading…</span>
    </div>
</div>

<!-- ── Exercise cards ─────────────────────────────────────────── -->
<div id="exercise-cards"></div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let activeCharts = {};

const EQUIPMENT_LABELS = {
    barbell:     'Barbell',
    free_weight: 'Dumbbell',
    cable:       'Cable',
    machine:     'Machine',
};

// ── Boot ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadWorkoutTitles);

// ── Populate title dropdown from completed workout history ────────────────────
function loadWorkoutTitles() {
    fetch('/api/progress/workout_titles')
        .then(r => r.json())
        .then(titles => {
            const sel = document.getElementById('template-select');
            sel.innerHTML = '';

            if (!titles || titles.length === 0) {
                document.getElementById('progress-controls').classList.add('d-none');
                document.getElementById('no-templates-msg').classList.remove('d-none');
                return;
            }

            titles.forEach(title => {
                const opt = document.createElement('option');
                opt.value = title;        // store the title string, not an ID
                opt.textContent = title;
                sel.appendChild(opt);
            });

            onTemplateChange();
        })
        .catch(() => {
            showError('Failed to load workout history.');
        });
}

// ── Event handlers ────────────────────────────────────────────────────────────
function onTemplateChange() { loadProgress(); }
function onPeriodChange()   { loadProgress(); }

// ── Load & render ─────────────────────────────────────────────────────────────
function loadProgress() {
    const title  = document.getElementById('template-select').value;
    const period = document.getElementById('period-select').value;
    if (!title) return;

    const container = document.getElementById('exercise-cards');
    const spinner   = document.getElementById('exercises-loading');

    Object.values(activeCharts).forEach(c => c.destroy());
    activeCharts = {};
    container.innerHTML = '';
    spinner.classList.remove('d-none');

    fetch(`/api/progress/by_title?title=${encodeURIComponent(title)}&period=${period}`)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
            spinner.classList.add('d-none');
            renderExerciseCards(data.exercises);
        })
        .catch(() => {
            spinner.classList.add('d-none');
            container.innerHTML = `<p style="font-family:var(--font-body);font-size:13px;color:var(--text-muted);">Failed to load progress data.</p>`;
        });
}

// ── Render exercise cards ─────────────────────────────────────────────────────
function renderExerciseCards(exercises) {
    const container = document.getElementById('exercise-cards');
    container.innerHTML = '';

    if (!exercises || exercises.length === 0) {
        container.innerHTML = `<div class="prog-empty">
            <p class="prog-empty__title">No qualifying sessions in this period.</p>
            <p class="prog-empty__sub">Only workouts with more than 2 logged exercises are shown. Try a wider date range.</p>
        </div>`;
        return;
    }

    exercises.forEach((ex, idx) => {
        container.appendChild(buildExerciseCard(ex, idx));
        const weighted = ex.data.filter(p => p.weight !== null);
        if (weighted.length > 0) renderChart(`chart-${idx}`, weighted);
    });
}

function buildExerciseCard(ex, idx) {
    const equipLabel = EQUIPMENT_LABELS[ex.equipment_type] || null;

    // Delta display — plain text, no pill badge
    let deltaCls  = 'delta--neutral';
    let deltaText = '—';
    if (ex.delta_label) {
        deltaText = ex.delta_label;
        deltaCls  = ex.delta > 0 ? 'delta--positive'
                  : ex.delta < 0 ? 'delta--negative'
                  : 'delta--neutral';
    } else if (ex.is_bodyweight) {
        deltaText = 'Bodyweight';
    }

    const weighted = ex.data.filter(p => p.weight !== null);

    let bodyHtml = '';
    if (weighted.length > 0) {
        bodyHtml = `<div class="prog-card__chart"><canvas id="chart-${idx}" role="img" aria-label="${escHtml(ex.name)} weight progression"></canvas></div>`;
    } else if (ex.is_bodyweight && ex.session_count > 0) {
        bodyHtml = `<div class="prog-card__sessions">${ex.session_count} session${ex.session_count !== 1 ? 's' : ''} logged — no weight tracked</div>`;
    } else {
        bodyHtml = `<div class="prog-card__nodata">Not logged in this period yet</div>`;
    }

    const el = document.createElement('article');
    el.className = 'prog-card';
    el.innerHTML = `
        <div class="prog-card__header">
            <div class="prog-card__meta">
                <span class="prog-card__name">${escHtml(ex.name)}</span>
                ${equipLabel ? `<span class="prog-card__equip">${escHtml(equipLabel)}</span>` : ''}
            </div>
            <span class="prog-card__delta ${deltaCls}" aria-label="Delta: ${escHtml(deltaText)}">${escHtml(deltaText)}</span>
        </div>
        ${bodyHtml}`;

    maybeInject1RM(el, ex.name);
    return el;
}

// ── 1RM Bayesian Estimator ────────────────────────────────────────────────────

const TRACKED_MOVEMENTS = {
    "Back Squat":                         "back-squat",
    "Back Squats":                        "back-squat",
    "Squat":                              "back-squat",
    "Squats":                             "back-squat",
    "Conventional Deadlift":              "conventional-deadlift",
    "Deadlift":                           "conventional-deadlift",
    "Deadlifts":                          "conventional-deadlift",
    "Bench Press (Flat Barbell)":         "bench-press",
    "Bench Press":                        "bench-press",
    "Overhead Press (Standing Barbell)":  "overhead-press",
    "Overhead Press":                     "overhead-press",
    "OHP":                                "overhead-press",
    "Shoulder Press":                     "overhead-press",
    "Romanian Deadlift":                  "romanian-deadlift",
    "Romanian Deadlifts":                 "romanian-deadlift",
    "RDL":                                "romanian-deadlift",
    "Barbell Row":                        "barbell-row",
    "Barbell Rows":                       "barbell-row",
    "Rows":                               "barbell-row",
    "BB Row":                             "barbell-row",
};

/**
 * If the exercise is a tracked compound movement, append a loading
 * placeholder to the card immediately, then fetch and render the
 * 1RM HDI card. Degrades gracefully on cold-start or service errors.
 */
function maybeInject1RM(cardEl, exerciseName) {
    const slug = TRACKED_MOVEMENTS[exerciseName];
    if (!slug) return;

    const placeholder = document.createElement('div');
    placeholder.className = 'one-rm-card--loading';
    placeholder.textContent = 'Loading 1RM estimate…';
    cardEl.appendChild(placeholder);

    fetch(`/api/1rm/${slug}`)
        .then(r => r.json().then(data => ({ status: r.status, data })))
        .then(({ status, data }) => {
            placeholder.remove();
            if (status !== 200 || data.error) {
                const errEl = document.createElement('div');
                errEl.className = 'one-rm-card--error';
                errEl.textContent = data.message || 'No logged sets found for this movement';
                cardEl.appendChild(errEl);
                return;
            }
            cardEl.appendChild(build1RMCard(data));
        })
        .catch(() => {
            placeholder.remove();
            const errEl = document.createElement('div');
            errEl.className = 'one-rm-card--error';
            errEl.textContent = 'Could not reach 1RM service';
            cardEl.appendChild(errEl);
        });
}

/**
 * Build the 1RM HDI range bar card from the JSON payload.
 *
 * Layout:
 *   [posterior_mean]  lbs
 *   ──────[═══════════]──────
 *   [hdi_lower]        [hdi_upper]
 *   94% credible interval
 */
function build1RMCard(data) {
    const { posterior_mean, hdi_lower, hdi_upper, uncertainty_note } = data;

    // Range bar geometry: 50% margin on each side of the HDI span
    const span = hdi_upper - hdi_lower;
    const margin = span * 0.5;
    const rangeMin = hdi_lower - margin;
    const rangeMax = hdi_upper + margin;
    const totalRange = rangeMax - rangeMin;

    const fillLeft  = ((hdi_lower    - rangeMin) / totalRange * 100).toFixed(2);
    const fillWidth = ((hdi_upper    - hdi_lower) / totalRange * 100).toFixed(2);
    const tickLeft  = ((posterior_mean - rangeMin) / totalRange * 100).toFixed(2);

    const wrapper = document.createElement('div');
    wrapper.className = 'one-rm-card';
    wrapper.setAttribute('aria-label',
        `Estimated 1RM: ${posterior_mean} lbs, 94% credible interval ${hdi_lower}–${hdi_upper} lbs`);

    wrapper.innerHTML = `
        <div class="one-rm__mean-row">
            <span class="one-rm__mean">${posterior_mean.toFixed(1)}</span>
            <span class="one-rm__unit">lbs</span>
        </div>
        <div class="one-rm__range-wrap" role="img" aria-hidden="true">
            <div class="one-rm__range-fill" style="left:${fillLeft}%;width:${fillWidth}%"></div>
            <div class="one-rm__range-tick" style="left:${tickLeft}%"></div>
        </div>
        <div class="one-rm__bounds">
            <span>${hdi_lower.toFixed(1)}</span>
            <span>${hdi_upper.toFixed(1)}</span>
        </div>
        <div class="one-rm__label-row">
            <span class="one-rm__ci-label">94% credible interval</span>
            ${uncertainty_note
                ? `<span class="one-rm__uncertainty">${escHtml(uncertainty_note)}</span>`
                : ''}
        </div>`;

    return wrapper;
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function renderChart(canvasId, points) {
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;

    // App is always dark — use token values directly
    const axisColor = '#797876';           // --text-muted
    const gridColor = 'rgba(205,204,202,0.06)'; // alpha border approximate

    activeCharts[canvasId] = new Chart(ctx, {
        type: 'line',
        data: {
            labels: points.map(p => p.date),
            datasets: [{
                data:             points.map(p => p.weight),
                borderColor:      '#4f98a3',
                backgroundColor:  'rgba(79,152,163,0.10)',
                borderWidth:      2,
                pointRadius:      points.length === 1 ? 5 : 3,
                pointHoverRadius: 6,
                pointBackgroundColor: '#4f98a3',
                tension:          0.3,
                fill:             true,
            }]
        },
        options: {
            responsive:          true,
            maintainAspectRatio: false,
            animation:           { duration: 200 },
            plugins: {
                legend:  { display: false },
                tooltip: {
                    backgroundColor: '#1c1b19',
                    borderColor:     'rgba(205,204,202,0.10)',
                    borderWidth:     1,
                    titleColor:      '#cdccca',
                    bodyColor:       '#797876',
                    callbacks: {
                        label: c => ` ${c.parsed.y} lbs`
                    }
                }
            },
            scales: {
                x: {
                    ticks: {
                        color:          axisColor,
                        maxTicksLimit:  5,
                        font:           { size: 10, family: 'Satoshi, system-ui, sans-serif' }
                    },
                    grid: { color: gridColor },
                    border: { color: gridColor }
                },
                y: {
                    beginAtZero: false,
                    ticks: {
                        color: axisColor,
                        font: { size: 10, family: 'Satoshi, system-ui, sans-serif' }
                    },
                    grid:   { color: gridColor },
                    border: { color: gridColor }
                }
            }
        }
    });
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str || ''));
    return d.innerHTML;
}
</script>
{% endblock %}
