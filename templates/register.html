{% extends "base.html" %}

{% block title %}Register — FitGlyph{% endblock %}

{% block extra_css %}
<style>
    .auth-wrapper {
        min-height: calc(100vh - 120px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 16px;
    }

    .auth-wordmark {
        font-family: 'Cabinet Grotesk', sans-serif;
        font-size: 24px;
        font-weight: 700;
        color: #cdccca;
        letter-spacing: -0.02em;
        margin-bottom: 20px;
        width: 100%;
        max-width: 400px;
    }

    .auth-card {
        background: #161513;
        border: 1px solid oklch(from #cdccca l c h / 0.10);
        border-radius: 10px;
        box-shadow: 0 1px 2px oklch(0 0 0 / 0.20), 0 4px 16px oklch(0 0 0 / 0.14);
        padding: 32px;
        width: 100%;
        max-width: 400px;
    }

    .fg-alert {
        background: rgba(187, 101, 59, 0.12);
        border: 1px solid rgba(187, 101, 59, 0.30);
        border-radius: 6px;
        color: #bb653b;
        font-family: 'Satoshi', sans-serif;
        font-size: 14px;
        padding: 10px 12px;
        margin-bottom: 20px;
    }

    .fg-field {
        margin-bottom: 18px;
    }

    .fg-label {
        display: block;
        font-family: 'Satoshi', sans-serif;
        font-size: 11px;
        font-weight: 500;
        color: #797876;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
    }

    .fg-input {
        display: block;
        width: 100%;
        min-height: 44px;
        background: #0f0e0d;
        border: 1px solid oklch(from #cdccca l c h / 0.10);
        border-radius: 6px;
        color: #cdccca;
        font-family: 'Satoshi', sans-serif;
        font-size: 14px;
        padding: 10px 12px;
        box-sizing: border-box;
        transition: border-color 0.15s ease;
    }

    .fg-input:focus {
        outline: none;
        border-color: #4f98a3;
    }

    .fg-input::placeholder {
        color: #5a5957;
    }

    .fg-hint {
        font-family: 'Satoshi', sans-serif;
        font-size: 12px;
        color: #5a5957;
        margin-top: 5px;
        margin-bottom: 0;
    }

    .btn-fg-accent {
        display: block;
        width: 100%;
        min-height: 44px;
        background: #4f98a3;
        border: none;
        border-radius: 6px;
        color: #0f0e0d;
        font-family: 'Satoshi', sans-serif;
        font-size: 14px;
        font-weight: 600;
        padding: 11px 16px;
        cursor: pointer;
        text-align: center;
        margin-top: 6px;
        transition: background-color 0.15s ease;
    }

    .btn-fg-accent:hover {
        background: #5aa8b4;
    }

    .auth-footer {
        font-family: 'Satoshi', sans-serif;
        font-size: 13px;
        color: #5a5957;
        margin-top: 24px;
        margin-bottom: 0;
    }

    .auth-footer a {
        color: #797876;
        text-decoration: none;
        border-bottom: 1px solid rgba(205, 204, 202, 0.15);
        transition: color 0.15s ease;
    }

    .auth-footer a:hover {
        color: #cdccca;
    }

    @media (prefers-reduced-motion: reduce) {
        .fg-input, .btn-fg-accent, .auth-footer a {
            transition: none;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-wordmark">FitGlyph</div>

    <div class="auth-card">
        {% if error %}
        <div class="fg-alert" role="alert">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
            <div class="fg-field">
                <label class="fg-label" for="username">Username</label>
                <input type="text" class="fg-input" id="username" name="username" required minlength="3">
                <p class="fg-hint">At least 3 characters</p>
            </div>

            <div class="fg-field">
                <label class="fg-label" for="email">Email</label>
                <input type="email" class="fg-input" id="email" name="email" required>
            </div>

            <div class="fg-field">
                <label class="fg-label" for="password">Password</label>
                <input type="password" class="fg-input" id="password" name="password" required minlength="6">
                <p class="fg-hint">At least 6 characters</p>
            </div>

            <div class="fg-field">
                <label class="fg-label" for="confirm_password">Confirm Password</label>
                <input type="password" class="fg-input" id="confirm_password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn-fg-accent">Create Account</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="/login">Login</a></p>
    </div>
</div>
{% endblock %}
